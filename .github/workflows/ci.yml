name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          FLASK_ENV: testing
        run: pytest tests/ -v

  build-and-deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          clean: true
          fetch-depth: 1

      - name: Clean git state
        run: |
          rm -f .gitmodules
          rm -rf .git/modules
          git config --global --remove-section submodule 2>/dev/null || true
        continue-on-error: true
        shell: bash

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build Docker image (no cache, lower bandwidth)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/flask-blog:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/flask-blog:buildcache
          cache-to: type=inline
          build-args: |
            BUILDKIT_INLINE_CACHE=0

      - name: Pull new image to minikube
        run: |
          echo "Pulling image to minikube..."
          minikube image pull ${{ secrets.DOCKERHUB_USERNAME }}/flask-blog:latest || true
        shell: bash

      - name: Deploy to minikube
        run: |
          echo "Deploying to minikube..."
          kubectl apply -f k8s/postgres.yaml
          kubectl apply -f k8s/flask-blog-deployment.yaml
          kubectl apply -f k8s/flask-blog-service.yaml
          kubectl apply -f k8s/flask-blog-hpa.yaml 2>/dev/null || true
          kubectl rollout restart deployment flask-blog
          echo "Waiting for deployment (60s timeout)..."
          kubectl rollout status deployment flask-blog --timeout=60s || true
          echo "Deployment status:"
          kubectl get pods -l app=flask-blog
        shell: bash
