database:
  name: flask_blog
  engine: sqlite

services:
  - type: web
    name: flask-blog
    env: python
    pythonVersion: "3.11"
    buildCommand: pip install -r requirements.txt
    startCommand: bash -c "python -c \"from app import create_app, db; app = create_app('production'); app.app_context().push(); db.create_all()\" && gunicorn app:app --bind 0.0.0.0:$PORT --workers 1"
    healthCheckPath: /
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true